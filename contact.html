<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - E-Learning</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <header>
        <h1>E-Learning Portal</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html">Login / Register</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2>Contact Us</h2>
        <div class="contact-grid">
            <div class="course-info">
                <h3>Contact Information</h3>
                <br>
                <p><strong>Address:</strong> 123 E-Learning Street, Education City, 10001</p>
                <br>
                <p><strong>Email:</strong> admin@elearning.com</p>
                <br>
                <p><strong>Phone:</strong> (123) 456-7890</p>
            </div>

            <div class="form-container">
                <h3>Send us an Inquiry</h3>
                <br>
                <form action="#" onsubmit="alert('Message Sent'); return false;">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn">Submit Form</button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <p>Copyright &copy; 2026 E-Learning</p>
    </footer>
</body>
</html>
