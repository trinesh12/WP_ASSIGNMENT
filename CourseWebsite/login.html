<!DOCTYPE html>
<html>
<head>
    <title>Login / Register - E-Learning</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>E-Learning Portal</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html">Login / Register</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="auth-grid">
            
            <div class="form-container">
                <h2>Login</h2>
                <br>
                <!-- OnSubmit calls validateLogin() -> returns false to prevent reload -->
                <form name="loginForm" onsubmit="return validateLogin()">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" id="login-email" name="email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-pass" name="password">
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
            </div>

            <div class="form-container">
                <h2>Register</h2>
                <br>
                <form name="registerForm" onsubmit="return validateRegistration()">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="reg-name" name="name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" id="reg-email" name="email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-pass" name="password">
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="reg-confirm-pass" name="confirm_password">
                    </div>
                    <button type="submit" class="btn">Submit</button>
                </form>
            </div>

        </div>
    </div>

    <footer>
        <p>Copyright &copy; 2026 E-Learning</p>
    </footer>
</body>
</html>
